name: Bump Homebrew formula

# When a version tag (v*) is pushed, update the formula in
# DecampsRenan/homebrew-tap (url + sha256) so
# `brew install decampsrenan/tap/worktree-cleaner` tracks the new release.
#
# Requires a repo secret HOMEBREW_TAP_TOKEN: a GitHub PAT with write access to
# the tap repo (classic: `repo` scope; fine-grained: Contents read/write on
# DecampsRenan/homebrew-tap). With write access the bump is pushed directly to
# the tap's main branch; otherwise the action opens a pull request instead.
#
# We compute the source-tarball sha256 ourselves and pass it as download-sha256
# so the action skips its own tarball fetch. GitHub's archive URLs now answer
# with HTTP 303 (not 302), which bump-homebrew-formula-action@v4 rejects with
# "unexpected HTTP 303 response" (mislav/bump-homebrew-formula-action#340).
on:
  push:
    tags:
      - "v*"
  # Manual re-run for an existing tag (e.g. if the token was missing first time).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to bump the formula to (e.g. v0.2.0)"
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and source tarball sha256
        id: src
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          url="https://github.com/${{ github.repository }}/archive/refs/tags/${tag}.tar.gz"
          sha=$(curl -fsSL "$url" | shasum -a 256 | cut -d' ' -f1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Bump formula in tap
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: worktree-cleaner
          formula-path: Formula/worktree-cleaner.rb
          homebrew-tap: DecampsRenan/homebrew-tap
          base-branch: main
          tag-name: ${{ steps.src.outputs.tag }}
          download-url: ${{ steps.src.outputs.url }}
          download-sha256: ${{ steps.src.outputs.sha256 }}
          commit-message: |
            worktree-cleaner {{version}}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
