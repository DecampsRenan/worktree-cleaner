name: Publish to crates.io

# Manually triggered from the Actions tab (Run workflow). Verifies that the
# Cargo.toml version is newer than what's on crates.io, runs the tests, then
# publishes.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version is newer than crates.io
        run: |
          set -euo pipefail
          NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          NEW=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "Cargo.toml: $NAME $NEW"

          PUBLISHED=$(curl -sS \
            -H "User-Agent: ${NAME}-ci (github actions)" \
            "https://crates.io/api/v1/crates/${NAME}" \
            | jq -r '.crate.max_version // empty')

          if [ -z "$PUBLISHED" ]; then
            echo "Not yet on crates.io — first publish. Proceeding."
            exit 0
          fi
          echo "Latest on crates.io: $PUBLISHED"

          if [ "$NEW" = "$PUBLISHED" ]; then
            echo "::error::Version $NEW is already published. Bump the version in Cargo.toml."
            exit 1
          fi

          HIGHEST=$(printf '%s\n%s\n' "$NEW" "$PUBLISHED" | sort -V | tail -n1)
          if [ "$HIGHEST" != "$NEW" ]; then
            echo "::error::Version $NEW is not greater than the published $PUBLISHED."
            exit 1
          fi
          echo "OK: $NEW > $PUBLISHED"

      - name: Test
        run: cargo test --all-targets --locked

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
